<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Chinese Reading Buddy Pro v38.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;700&family=Syne:wght@700;800&display=swap');
        :root { --indigo: #4f46e5; --indigo-dark: #3730a3; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background: #fdfdfd; 
            color: #1e293b; 
            overflow-x: hidden;
            width: 100%;
        }
        .chinese-text { font-family: 'Noto Sans SC', serif; line-height: 2.2; }
        
        .segment { 
            transition: all 0.2s ease; 
            border-radius: 6px; 
            padding: 2px 4px; 
            display: inline; 
            cursor: pointer;
            border-bottom: 2px solid transparent;
            user-select: text;
        }
        .segment:hover { background: rgba(79, 70, 229, 0.05); }
        .highlight-active { 
            background: #fde047 !important; 
            border-bottom: 2px solid #eab308; 
            color: #000; 
            box-shadow: 0 2px 8px rgba(234, 179, 8, 0.3); 
        }

        .glass-panel { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .btn-shadow { box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.3); }
        
        #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20000; }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4f46e5; }
        input:checked + .slider:before { transform: translateX(20px); }

        #logPanel {
            position: fixed; bottom: 10px; right: 10px; width: 300px;
            background: rgba(15, 23, 42, 0.98); color: #4ade80; padding: 10px;
            border-radius: 12px; z-index: 5000; font-family: monospace;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #logContent { height: 120px; overflow-y: auto; font-size: 10px; display: flex; flex-direction: column-reverse; }
        .minimized#logPanel { width: 120px; height: 32px; overflow: hidden; }
        .minimized #logContent { display: none; }

        .spinner {
            border: 3px solid rgba(79, 70, 229, 0.1); border-left-color: #4f46e5;
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #searchTrigger {
            position: absolute;
            z-index: 15000;
            display: none;
            background: #4f46e5;
            color: white;
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.6);
            cursor: pointer;
            pointer-events: auto;
            white-space: nowrap;
            border: 2px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body class="min-h-screen pb-32 w-full">

    <!-- デバッグログ -->
    <div id="logPanel" class="minimized" onclick="if(event.target.tagName !== 'BUTTON') this.classList.toggle('minimized')">
        <div class="flex justify-between items-center cursor-pointer mb-1">
            <span class="text-[10px] font-bold text-white uppercase tracking-wider">Debug Log v38.0</span>
            <button id="copyLogBtn" class="bg-slate-700 text-white px-2 py-0.5 rounded text-[10px] font-bold">COPY</button>
        </div>
        <div id="logContent"></div>
    </div>

    <!-- 検索トリガーボタン -->
    <div id="searchTrigger">意味を調べる 🔍</div>

    <!-- ナビゲーション -->
    <nav class="sticky top-0 z-[100] glass-panel px-4 py-2 w-full">
        <div class="flex items-center justify-between w-full max-w-full">
            <div class="flex flex-col items-start leading-none gap-0.5">
                <h1 class="text-base sm:text-lg font-black text-indigo-600 tracking-tighter" style="font-family: 'Syne', sans-serif;">READING BUDDY</h1>
                <span class="text-[9px] bg-indigo-600 text-white px-1.5 py-0.5 rounded-sm font-black flex-shrink-0 self-start">PRO v38.0</span>
            </div>
            <button id="openSettingsBtn" class="p-2.5 text-slate-500 hover:text-indigo-600 transition-all bg-white shadow-sm border border-slate-100 rounded-full flex-shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
        </div>
    </nav>

    <main class="w-full px-4 py-4 space-y-8 mt-2 max-w-full">

                    <div><div class="text-[8px] font-black opacity-60 uppercase mb-1">Time</div><div id="finalTime" class="text-xl font-black">0s</div></div>
                    <div><div class="text-[8px] font-black opacity-60 uppercase mb-1">CPM</div><div id="cpmResult" class="text-xl font-black">0</div></div>

                <div class="flex gap-1.5">
                    <button id="exportCSV" class="text-[9px] font-black bg-indigo-50 text-indigo-600 px-3 py-2 rounded-lg">CSV COPY</button>
                    <button id="clearAllVocab" class="text-[9px] font-black bg-red-50 text-red-400 px-3 py-2 rounded-lg">CLEAR</button>
                </div>
            </div>
            <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
                <div class="overflow-x-auto w-full"><table class="w-full text-left min-w-[500px]"><thead class="bg-slate-50 border-b border-slate-100"><tr><th class="p-3 text-[9px] font-black text-slate-400 uppercase tracking-widest">Word</th><th class="p-3 text-[9px] font-black text-slate-400 uppercase tracking-widest">Meaning</th><th class="p-3 text-[9px] font-black text-slate-400 uppercase tracking-widest">Details</th><th class="p-3 w-8"></th></tr></thead><tbody id="vocabTableBody"></tbody></table></div>

            <div id="dictLoading" class="hidden flex flex-col items-center py-12 space-y-4"><div class="spinner"></div><p class="text-[9px] font-black text-slate-400 tracking-widest uppercase">AI Analyzing...</p></div>
            <div id="dictContent" class="space-y-6">

                    <div class="space-y-1"><h3 id="dictWord" class="text-4xl font-black text-indigo-600 tracking-tighter">...</h3><p id="dictPinyin" class="text-base font-bold text-slate-400 italic">...</p></div>
                    <div class="text-right"><p id="dictEng" class="text-lg font-black text-slate-800">...</p></div>
                </div>
                <div class="grid gap-4">
                    <div class="space-y-1"><label class="text-[8px] font-black text-slate-300 uppercase tracking-widest">Meaning</label><div id="dictMean" class="text-base font-bold text-slate-700 leading-tight">...</div></div>
                    <div class="space-y-1.5"><label class="text-[8px] font-black text-slate-300 uppercase tracking-widest">Example (CN)</label><div id="dictExCn" class="text-base font-bold text-slate-800 bg-slate-50 p-3 rounded-xl chinese-text border border-slate-100">...</div></div>
                    <div class="space-y-1"><label class="text-[8px] font-black text-slate-300 uppercase tracking-widest">JP Translation</label><div id="dictExJp" class="text-xs font-bold text-slate-400 italic">...</div></div>
                </div>
                <button id="addToListBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-lg text-base">単語帳に追加</button>
            </div>
        </div>
    </div>

    <div id="toast" class="bg-slate-900 text-white px-8 py-4 rounded-2xl text-[9px] font-black shadow-2xl tracking-widest uppercase">Message</div>

    <script>
        // Core Logic
        const synth = window.speechSynthesis;
        let isPlaying = false, currentIndex = 0, segments = [];
        let geminiApiKey = localStorage.getItem('crb_gemini_key') || "";
        let vocabList = JSON.parse(localStorage.getItem('crb_pro_vocab_v20') || '[]');
        let selectedTextForSearch = "";
        let currentAudio = null;

        const modelList = [
            "gemini-2.5-flash-preview-tts",
            "gemini-2.5-pro-preview-tts",
            "gemini-2.5-flash",
            "gemini-2.5-pro",
            "gemini-2.0-flash",
            "gemini-2.0-flash-lite"
        ];

        function addLog(msg, type = 'info') {
            const container = document.getElementById('logContent');
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString('ja-JP', { hour12: false });
            entry.className = "py-0.5 border-b border-white/5 whitespace-pre-wrap break-all";
            let color = '#4ade80';
            if(type === 'error') color = '#f87171';
            if(type === 'warn') color = '#fbbf24';
            if(type === 'debug') color = '#60a5fa';
            entry.innerHTML = `<span style="opacity:0.4">[${time}]</span> <span style="color:${color}">${msg}</span>`;
            container.prepend(entry);
        }

        // --- TTS Engine Upgrade ---
        async function speak() {
            if (!isPlaying || currentIndex >= segments.length) { 
                isPlaying = false; updateIcons(); return; 
            }
            
            stopAnyAudio();
            const text = segments[currentIndex].trim();
            updateHighlight(currentIndex);
            updateIcons();

            if (geminiApiKey) {
                try {
                    addLog(`AI TTS TRY: "${text.substring(0,10)}..."`, 'debug');
                    const audioBuffer = await getGeminiTTS(text);
                    if (audioBuffer) {
                        playAudioBuffer(audioBuffer);
                        return;
                    }
                } catch (e) {
                    addLog(`AI TTS FAIL: ${e.message}. Falling back to Browser TTS.`, 'warn');
                }
            }
            
            // Fallback to standard Browser TTS
            speakWithBrowser(text);
        }

        function stopAnyAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            synth.cancel();
        }

        function speakWithBrowser(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = parseFloat(document.getElementById('rateRange').value);
            utterance.onend = onPlaybackEnd;
            synth.speak(utterance);
        }

        async function getGeminiTTS(text) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${geminiApiKey}`;
            const payload = {
                contents: [{ parts: [{ text: `Say in a clear and natural Chinese (Mandarin) voice: ${text}` }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } // Kore is a good standard voice
                    }
                }
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const result = await response.json();
            const base64Data = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
            if (!base64Data) return null;

            // Convert PCM16 to WAV (Simplified helper)
            return pcmToWav(base64Data, 24000); // Gemini TTS usually defaults to 24kHz
        }

        function pcmToWav(base64, sampleRate) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            
            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + len, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, len, true);

            const blob = new Blob([wavHeader, bytes], { type: 'audio/wav' });
            return URL.createObjectURL(blob);
        }

        function playAudioBuffer(url) {
            currentAudio = new Audio(url);
            currentAudio.playbackRate = parseFloat(document.getElementById('rateRange').value);
            currentAudio.onended = onPlaybackEnd;
            currentAudio.play();
        }

        function onPlaybackEnd() {
            if (isPlaying) {
                currentIndex++;
                if (document.getElementById('autoModeToggle').checked && currentIndex < segments.length) {
                    speak();
                } else {
                    isPlaying = false;
                    updateIcons();
                }
            }
        }

        // --- Existing Features UI Logic (Maintained) ---
        function updateIcons() {
            document.getElementById('playIcon').classList.toggle('hidden', isPlaying);
            document.getElementById('pauseIcon').classList.toggle('hidden', !isPlaying);
        }

        function setMode(mode) {
            const isReading = mode === 'reading';
            document.getElementById('textInput').classList.toggle('hidden', isReading);
            document.getElementById('readerDisplay').classList.toggle('hidden', !isReading);
            document.getElementById('startReadBtn').classList.toggle('hidden', isReading);
            document.getElementById('playerControls').classList.toggle('hidden', isReading ? false : true);
            document.getElementById('playbackOptions').classList.toggle('hidden', !isReading);
            document.getElementById('editHint').classList.toggle('hidden', !isReading);
            document.getElementById('modeLabel').innerText = isReading ? "Reading Mode" : "Input Mode";
        }

        document.getElementById('startReadBtn').onclick = () => {
            const raw = document.getElementById('textInput').value.trim();
            if (!raw) return;
            segments = raw.match(/([^，。！？；：\n]+[，。！？；：\n]*)/g) || [raw];
            currentIndex = 0;
            const display = document.getElementById('readerDisplay');
            display.innerHTML = segments.map((s, i) => `<span class="segment" data-idx="${i}">${s}</span>`).join('');
            
            display.addEventListener('mouseup', handleTextSelection);
            display.addEventListener('touchend', handleTextSelection);
            
            display.querySelectorAll('.segment').forEach(el => {
                el.onclick = () => {
                    if (!window.getSelection().toString().trim()) {
                        currentIndex = parseInt(el.dataset.idx); isPlaying = true; speak();
                    }
                };
            });
            setMode('reading'); isPlaying = true; speak();
        };

        function handleTextSelection() {
            setTimeout(() => {
                const sel = window.getSelection();
                const word = sel.toString().trim();
                const trigger = document.getElementById('searchTrigger');
                if (word && /[\u4e00-\u9fa5]/.test(word)) {
                    selectedTextForSearch = word;
                    const range = sel.getRangeAt(0);
                    const rect = range.getBoundingClientRect();
                    trigger.innerText = `意味を調べる: "${word.substring(0,8)}"`;
                    trigger.style.display = 'block';
                    const topPos = window.scrollY + rect.top - 70;
                    const leftPos = window.scrollX + rect.left + (rect.width/2) - (trigger.offsetWidth/2);
                    trigger.style.top = `${topPos}px`;
                    trigger.style.left = `${Math.max(10, Math.min(window.innerWidth - trigger.offsetWidth - 10, leftPos))}px`;
                } else {
                    trigger.style.display = 'none';
                }
            }, 100);
        }

        document.getElementById('searchTrigger').onmousedown = (e) => {
            e.preventDefault(); e.stopPropagation();
            document.getElementById('searchTrigger').style.display = 'none';
            if (selectedTextForSearch) openDictionary(selectedTextForSearch);
        };

        async function fetchGeminiWithFallback(prompt, models, index = 0) {
            if (index >= models.length) throw new Error("Retry failed");
            const model = models[index];
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${geminiApiKey}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                if (!response.ok) return await fetchGeminiWithFallback(prompt, models, index + 1);
                return await response.json();
            } catch (e) { return await fetchGeminiWithFallback(prompt, models, index + 1); }
        }

        async function openDictionary(word) {
            if (!geminiApiKey) { document.getElementById('settingsModal').classList.remove('hidden'); return; }
            const modal = document.getElementById('dictModal'), loading = document.getElementById('dictLoading'), content = document.getElementById('dictContent');
            modal.classList.remove('hidden'); loading.classList.remove('hidden'); content.classList.add('hidden');
            try {
                const prompt = `Explain "${word}" in Japanese. JSON format: {"pinyin":"...","meaning":"...","english":"...","exampleCn":"...","exampleJp":"..."}`;
                const data = await fetchGeminiWithFallback(prompt, modelList.slice(2)); // Skip TTS models for dictionary
                let rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                rawText = rawText.replace(/```json/gi, "").replace(/```/g, "").trim();
                const json = JSON.parse(rawText);
                document.getElementById('dictWord').innerText = word;
                document.getElementById('dictPinyin').innerText = json.pinyin || "-";
                document.getElementById('dictMean').innerText = json.meaning || "-";
                document.getElementById('dictEng').innerText = json.english || "-";
                document.getElementById('dictExCn').innerText = json.exampleCn || "-";
                document.getElementById('dictExJp').innerText = json.exampleJp || "-";
                loading.classList.add('hidden'); content.classList.remove('hidden');
            } catch (e) { modal.classList.add('hidden'); showToast("解析エラー"); }
        }

        function updateHighlight(idx) {
            document.querySelectorAll('.segment').forEach(el => el.classList.remove('highlight-active'));
            const target = document.querySelector(`.segment[data-idx="${idx}"]`);
            if (target) target.classList.add('highlight-active');
        }

        function saveVocab() { localStorage.setItem('crb_pro_vocab_v20', JSON.stringify(vocabList)); renderVocabTable(); }
        function renderVocabTable() {
            const body = document.getElementById('vocabTableBody'), empty = document.getElementById('emptyState');
            if (vocabList.length === 0) { empty.classList.remove('hidden'); body.innerHTML = ''; return; }
            empty.classList.add('hidden');
            body.innerHTML = vocabList.map((v, i) => `
                <tr class="border-b border-slate-50">
                    <td class="p-3"><div class="font-black text-indigo-600 text-lg cursor-pointer" onclick="openDictionary('${v.word}')">${v.word}</div><div class="text-[9px] font-bold text-slate-400">${v.pinyin}</div></td>
                    <td class="p-3 font-bold text-slate-600 text-sm">${v.meaning}</td>
                    <td class="p-3"><div class="text-xs text-slate-800 chinese-text">${v.exampleCn}</div><div class="text-[9px] text-slate-400 italic">${v.exampleJp}</div></td>
                    <td class="p-3 text-right"><button onclick="deleteItem(${i})" class="text-slate-300 hover:text-red-500">×</button></td>
                </tr>`).join('');
        }
        window.deleteItem = (i) => { vocabList.splice(i, 1); saveVocab(); };

        // Timer
        let startTime, timerInterval;
        window.startTimer = () => {
            startTime = Date.now();
            document.getElementById('timerStartBtn').disabled = true;
            document.getElementById('timerStopBtn').disabled = false;
            document.getElementById('timerStopBtn').className = "flex-1 bg-red-500 text-white py-3.5 rounded-xl font-black";
            document.getElementById('resultCard').classList.add('hidden');
            timerInterval = setInterval(() => {
                const ms = Date.now() - startTime;
                document.getElementById('currentTime').innerText = `00:${Math.floor(ms/1000).toString().padStart(2,'0')}.${Math.floor((ms%1000)/100)}`;
            }, 100);
        };
        window.stopTimer = () => {
            clearInterval(timerInterval);
            const ms = Date.now() - startTime, text = document.getElementById('textInput').value;
            const charCount = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
            const cpm = Math.round(charCount / (ms / 60000));
            document.getElementById('charCount').innerText = charCount;
            document.getElementById('finalTime').innerText = (ms/1000).toFixed(1)+'s';
            document.getElementById('cpmResult').innerText = isFinite(cpm) ? cpm : '0';
            document.getElementById('timerStartBtn').disabled = false;
            document.getElementById('timerStopBtn').disabled = true;
            document.getElementById('timerStopBtn').className = "flex-1 bg-slate-200 text-slate-400 py-3.5 rounded-xl font-black";
            document.getElementById('resultCard').classList.remove('hidden');
        };

        // UI Events
        document.getElementById('playBtn').onclick = () => { if(isPlaying){isPlaying=false; stopAnyAudio(); updateIcons();} else {isPlaying=true; speak();} };
        document.getElementById('stopBtn').onclick = () => { isPlaying = false; stopAnyAudio(); setMode('input'); };
        document.getElementById('clearTextBtn').onclick = () => { document.getElementById('textInput').value = ''; };
        document.getElementById('saveSettingsBtn').onclick = () => { geminiApiKey = document.getElementById('apiKeyInput').value.trim(); localStorage.setItem('crb_gemini_key', geminiApiKey); document.getElementById('settingsModal').classList.add('hidden'); showToast("SAVED"); };
        document.getElementById('openSettingsBtn').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');
        document.getElementById('closeSettingsBtn').onclick = () => document.getElementById('settingsModal').classList.add('hidden');
        document.getElementById('closeDictBtn').onclick = () => document.getElementById('dictModal').classList.add('hidden');
        document.getElementById('addToListBtn').onclick = () => { vocabList.unshift({ word: document.getElementById('dictWord').innerText, pinyin: document.getElementById('dictPinyin').innerText, meaning: document.getElementById('dictMean').innerText, exampleCn: document.getElementById('dictExCn').innerText, exampleJp: document.getElementById('dictExJp').innerText }); saveVocab(); document.getElementById('dictModal').classList.add('hidden'); showToast("ADDED"); };
        document.getElementById('exportCSV').onclick = () => { const csv = vocabList.map(v => `"${v.word}","${v.pinyin}","${v.meaning}"`).join('\n'); const el = document.createElement('textarea'); el.value = csv; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); showToast("CSV COPIED"); };
        document.getElementById('clearAllVocab').onclick = () => { if(confirm("消去しますか？")){vocabList=[];saveVocab();showToast("CLEARED");} };
        document.getElementById('copyLogBtn').onclick = (e) => { e.stopPropagation(); const text = Array.from(document.getElementById('logContent').children).map(c=>c.innerText).join('\n'); const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); showToast("LOGS COPIED"); };
        
        document.addEventListener('mousedown', (e) => { if (e.target.id !== 'searchTrigger') document.getElementById('searchTrigger').style.display = 'none'; });
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        
        window.onload = () => { renderVocabTable(); if(geminiApiKey) document.getElementById('apiKeyInput').value = geminiApiKey; addLog("READY v38.0 (AI TTS Engine Loaded)"); };
    </script>
</body>
</html>
