<html lang="ja">

    <title>Chinese Reading Buddy Pro v123.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+SC:wght@400;700&family=Syne:wght@800&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .chinese-text { font-family: 'Noto Sans SC', serif; line-height: 2.2; }
        .segment { transition: all 0.2s ease; border-radius: 4px; padding: 2px 4px; cursor: pointer; border-bottom: 2px solid transparent; display: inline; }
        .highlight-active { background: #fef08a !important; border-bottom: 2px solid #eab308; color: #000; }
        
        #logPanel { 
            position: fixed; bottom: 20px; right: 20px; width: 420px; height: 320px;
            background: rgba(15, 23, 42, 0.98); color: #4ade80; border-radius: 12px; z-index: 5000;
            display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1); min-width: 220px; min-height: 40px; touch-action: none;
        }
        #logHeader { cursor: move; padding: 10px 14px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; border-radius: 12px 12px 0 0; user-select: none; }
        #logContent { flex: 1; overflow-y: auto; font-size: 11px; padding: 10px; font-family: 'Consolas', 'Monaco', monospace; display: flex; flex-direction: column-reverse; word-break: break-all; }
        .log-minimized { height: 42px !important; width: 220px !important; }
        #logResizeHandle { position: absolute; top: 0; left: 0; width: 20px; height: 20px; cursor: nw-resize; z-index: 5001; }

        #waveformWrapper { position: relative; height: 120px; background: #f1f5f9; cursor: crosshair; }
        .seg-marker { position: absolute; top: 0; bottom: 0; width: 2px; background: #6366f1; cursor: col-resize; z-index: 30; }
        .seg-marker::after { content: attr(data-label); position: absolute; top: 2px; left: 4px; font-size: 9px; color: white; background: #6366f1; padding: 1px 4px; border-radius: 4px; white-space: nowrap; }
        
        #searchTrigger { position: fixed; z-index: 6000; display: none; background: #4f46e5; color: white; padding: 10px 20px; border-radius: 99px; font-size: 13px; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.4); font-weight: bold; border: 2px solid white; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>

    <div id="limitModal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-xl z-[40000] hidden flex items-center justify-center p-6 text-center">

    <script>
        const CONFIG = {
            VERSION: "v123.0",
            MODELS: {
                TTS: "gemini-2.5-flash-preview-tts",
                DICT: "gemini-3-flash-preview"
            },
            STORAGE_KEYS: {
                API: "crb_v123_api",
                VOCAB: "crb_v123_vocab"
            }
        };

        let userKey = localStorage.getItem(CONFIG.STORAGE_KEYS.API) || "";
        let segments = [], segmentMeta = [], currentIndex = 0;
        let audio = null, isPlaying = false, useWebSpeech = false;
        let monitorId = null, globalBuffer = null, zoomScale = 1, isSeekingNow = false;
        let rawAudioBlob = null; // ZIP保存用のBlob

        function log(msg, type = 'info') {
            const container = document.getElementById('logContent');
            const now = new Date();
            const ts = `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}]`;
            const div = document.createElement('div');
            const colors = { error: '#f87171', api: '#818cf8', success: '#34d399', warn: '#fbbf24' };
            div.style.color = colors[type] || '#4ade80';
            div.className = "mb-1 text-[10px]";
            div.innerHTML = `<span class="opacity-40 mr-2">${ts}</span>${typeof msg === 'object' ? JSON.stringify(msg) : msg}`;
            container.prepend(div);
        }

        async function startProcessing() {
            const input = document.getElementById('rawInput').value.trim();
            if (!input) return;
            if (!userKey) { document.getElementById('settingsModal').classList.remove('hidden'); return; }

            log(`読み上げ準備開始 (${CONFIG.VERSION})`);
            segments = input.match(/([^，。！？；：\n、\s]+[，。！？；：\n、\s]*)|([\n]+)/g).filter(s => s && s.trim().length > 0);
            currentIndex = 0;

            document.getElementById('readableOutput').innerHTML = segments.map((s, i) => `<span class="segment" id="seg-${i}" onclick="seek(${i})">${s}</span>`).join('');
            toggleMainUI(true);
            await generateAudio(input);
        }

        async function generateAudio(text) {
            const loader = document.getElementById('loadingOverlay');
            loader.classList.remove('hidden');
            try {
                log(`APIリクエスト送信中: ${CONFIG.MODELS.TTS}`, 'api');
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.MODELS.TTS}:generateContent?key=${userKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });

                const data = await response.json();
                if (!response.ok) {
                    if (response.status === 429) return showLimitModal(data.error?.message || "Rate Limit");
                    throw new Error(data.error?.message || "TTS失敗");
                }

                const part = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                const bin = atob(part.inlineData.data);
                const bytes = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

                const actx = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = actx.createBuffer(1, bytes.length / 2, 24000);
                const channelData = audioBuffer.getChannelData(0);
                const dataView = new DataView(bytes.buffer);
                for (let i = 0; i < channelData.length; i++) {
                    channelData[i] = dataView.getInt16(i * 2, true) / 32768.0;
                }
                globalBuffer = audioBuffer;
                actx.close();

                log(`デコード完了: ${globalBuffer.duration.toFixed(2)}s`, 'success');

                const wav = pcmToWav(bytes.buffer, 24000);
                rawAudioBlob = new Blob([wav], { type: 'audio/wav' });
                if (audio) { audio.pause(); audio = null; }
                audio = new Audio(URL.createObjectURL(rawAudioBlob));
                audio.onended = () => { if(!useWebSpeech) stopPlayback(); };
                
                segmentMeta = calculateSyncPointsAdvanced(segments, globalBuffer);
                
                useWebSpeech = false;
                document.getElementById('syncArea').classList.remove('hidden');
                document.getElementById('exportDataBtn').classList.remove('hidden');
                drawWaveform();
                renderMarkers();
                seek(0);
            } catch (err) {
                log(`変換エラー: ${err.message}`, 'error');
                startWebSpeechMode();
            } finally {
                loader.classList.add('hidden');
            }
        }

        function pcmToWav(pcm, rate) {
            const b = new ArrayBuffer(44 + pcm.byteLength);
            const v = new DataView(b);
            const s = (o, str) => { for (let i=0; i<str.length; i++) v.setUint8(o+i, str.charCodeAt(i)); };
            s(0, 'RIFF'); v.setUint32(4, 36 + pcm.byteLength, true); s(8, 'WAVE');
            s(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
            v.setUint32(24, rate, true); v.setUint32(28, rate * 2, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
            s(36, 'data'); v.setUint32(40, pcm.byteLength, true);
            new Uint8Array(b, 44).set(new Uint8Array(pcm));
            return b;
        }

        function calculateSyncPointsAdvanced(segs, buffer) {
            const dur = buffer.duration;
            const data = buffer.getChannelData(0);
            const sampleRate = buffer.sampleRate;
            const totalChars = segs.join('').length;
            const threshold = 0.01;
            const silenceWindow = Math.floor(sampleRate * 0.1); 
            const silences = [];
            for (let i = 0; i < data.length; i += silenceWindow) {
                let max = 0;
                for (let j = 0; j < silenceWindow && (i + j) < data.length; j++) {
                    max = Math.max(max, Math.abs(data[i + j]));
                }
                if (max < threshold) silences.push(i / sampleRate);
            }

            let meta = [];
            let currentStartTime = 0;
            let charAcc = 0;
            segs.forEach((s, i) => {
                charAcc += s.length;
                let ratioTime = (charAcc / totalChars) * dur;
                let bestSilence = silences.find(t => t > ratioTime - 0.3 && t < ratioTime + 0.5);
                let endTime = (i === segs.length - 1) ? dur : (bestSilence || ratioTime);
                meta.push({ start: currentStartTime, end: endTime });
                currentStartTime = endTime;
            });
            return meta;
        }

        function playPlayback() {
            if (useWebSpeech) return playWebSpeech();
            if (!audio) return;
            const meta = segmentMeta[currentIndex];
            if (Math.abs(audio.currentTime - meta.start) > 0.3) {
                audio.currentTime = meta.start;
                isSeekingNow = true;
                setTimeout(() => { isSeekingNow = false; }, 250);
            }
            audio.playbackRate = parseFloat(document.getElementById('rateRange').value);
            audio.play().then(() => {
                isPlaying = true; 
                updateControlIcons(); 
                updateHighlight();
                cancelAnimationFrame(monitorId); 
                monitorId = requestAnimationFrame(monitorPlayback);
            }).catch(e => log(`再生失敗: ${e.message}`, 'error'));
        }

        function stopPlayback() {
            isPlaying = false; 
            cancelAnimationFrame(monitorId);
            if (audio) audio.pause();
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            updateControlIcons();
        }

        function monitorPlayback() {
            if (!isPlaying || !audio || useWebSpeech) return;
            const now = audio.currentTime;
            const mode = document.querySelector('input[name="pMode"]:checked').value;
            const currentMeta = segmentMeta[currentIndex];
            document.getElementById('playbackCursor').style.left = `${(now / globalBuffer.duration) * 100}%`;

            if (!isSeekingNow && now >= currentMeta.end - 0.05) {
                if (mode === 'manual') {
                    audio.pause(); isPlaying = false; updateControlIcons(); return;
                } else {
                    if (currentIndex < segments.length - 1) { currentIndex++; updateHighlight(); }
                    else { stopPlayback(); return; }
                }
            }
            if (!isSeekingNow) {
                const found = segmentMeta.findIndex(m => now >= m.start && now < m.end);
                if (found !== -1 && found !== currentIndex) { currentIndex = found; updateHighlight(); }
            }
            monitorId = requestAnimationFrame(monitorPlayback);
        }

        function seek(idx) {
            currentIndex = idx;
            updateHighlight();
            if (useWebSpeech) playWebSpeech();
            else if (audio) {
                isSeekingNow = true;
                audio.currentTime = segmentMeta[currentIndex].start;
                setTimeout(() => { isSeekingNow = false; }, 250);
                playPlayback();
            }
        }

        function playWebSpeech() {
            window.speechSynthesis.cancel();
            const mode = document.querySelector('input[name="pMode"]:checked').value;
            const utter = new SpeechSynthesisUtterance(segments[currentIndex]);
            utter.lang = 'zh-CN';
            utter.rate = parseFloat(document.getElementById('rateRange').value);
            utter.onstart = () => { isPlaying = true; updateControlIcons(); updateHighlight(); };
            utter.onend = () => {
                if (!isPlaying) return;
                if (mode === 'continuous') {
                    if (currentIndex < segments.length - 1) { currentIndex++; playWebSpeech(); }
                    else stopPlayback();
                } else { isPlaying = false; updateControlIcons(); }
            };
            window.speechSynthesis.speak(utter);
        }

        function drawWaveform() {
            const canvas = document.getElementById('waveformCanvas');
            const wrapper = document.getElementById('waveformWrapper');
            const w = document.getElementById('waveformScroll').clientWidth * zoomScale;
            canvas.width = w; canvas.height = 120; wrapper.style.width = w + 'px';
            const ctx = canvas.getContext('2d');
            const data = globalBuffer.getChannelData(0);
            const step = Math.ceil(data.length / w);
            ctx.clearRect(0,0,w,120); 
            ctx.fillStyle = '#cbd5e1';
            for(let i=0; i<w; i++){
                let min=1, max=-1;
                for(let j=0; j<step; j++){
                    const d = data[(i*step)+j];
                    if(d<min) min=d; if(d>max) max=d;
                }
                ctx.fillRect(i, (1+min)*60, 1, Math.max(1, (max-min)*60));
            }
        }

        function renderMarkers() {
            const layer = document.getElementById('markerLayer');
            layer.innerHTML = "";
            const dur = globalBuffer.duration;
            segmentMeta.forEach((m, i) => {
                if (i === 0) return;
                const mk = document.createElement('div');
                mk.className = 'seg-marker';
                mk.style.left = `${(m.start/dur)*100}%`;
                mk.dataset.label = `S${i+1}`;
                mk.onmousedown = (e) => {
                    e.preventDefault();
                    const rect = document.getElementById('waveformWrapper').getBoundingClientRect();
                    const mv = (ev) => {
                        const x = ev.clientX - rect.left;
                        const time = Math.max(segmentMeta[i-1].start + 0.01, Math.min((x/rect.width)*dur, (segmentMeta[i+1]?.start || dur) - 0.01));
                        m.start = time; segmentMeta[i-1].end = time;
                        mk.style.left = `${(time/dur)*100}%`;
                    };
                    const up = () => { window.removeEventListener('mousemove', mv); window.removeEventListener('mouseup', up); };
                    window.addEventListener('mousemove', mv); window.addEventListener('mouseup', up);
                };
                layer.appendChild(mk);
            });
        }

        // --- Data Export & Import (ZIP) ---
        async function exportDataAsZip() {
            if (!rawAudioBlob || !segments.length) { log("保存するデータがありません", "error"); return; }
            log("ZIP生成中...");
            const zip = new JSZip();
            zip.file("audio.wav", rawAudioBlob);
            zip.file("text.json", JSON.stringify({
                version: CONFIG.VERSION,
                segments: segments,
                meta: segmentMeta,
                rawInput: document.getElementById('rawInput').value
            }));
            const content = await zip.generateAsync({ type: "blob" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(content);
            a.download = `reading_data_${Date.now()}.zip`;
            a.click();
            log("ZIPエクスポート完了", "success");
        }

        async function importZipData(file) {
            log("ZIP読込中...");
            const loader = document.getElementById('loadingOverlay');
            loader.classList.remove('hidden');
            try {
                const zip = await JSZip.loadAsync(file);
                const textJson = await zip.file("text.json").async("string");
                const data = JSON.parse(textJson);
                
                const audioData = await zip.file("audio.wav").async("arraybuffer");
                rawAudioBlob = new Blob([audioData], { type: 'audio/wav' });

                const actx = new (window.AudioContext || window.webkitAudioContext)();
                globalBuffer = await actx.decodeAudioData(audioData);
                actx.close();

                document.getElementById('rawInput').value = data.rawInput;
                segments = data.segments;
                segmentMeta = data.meta;
                
                document.getElementById('readableOutput').innerHTML = segments.map((s, i) => `<span class="segment" id="seg-${i}" onclick="seek(${i})">${s}</span>`).join('');
                if (audio) { audio.pause(); audio = null; }
                audio = new Audio(URL.createObjectURL(rawAudioBlob));
                audio.onended = () => { if(!useWebSpeech) stopPlayback(); };

                toggleMainUI(true);
                useWebSpeech = false;
                document.getElementById('syncArea').classList.remove('hidden');
                document.getElementById('exportDataBtn').classList.remove('hidden');
                drawWaveform();
                renderMarkers();
                seek(0);
                log("読込成功", "success");
            } catch (err) {
                log(`読込エラー: ${err.message}`, "error");
            } finally {
                loader.classList.add('hidden');
            }
        }

        // --- Dictionary & Vocab Logic ---
        async function lookupWord(word) {
            const modal = document.getElementById('dictModal');
            const btnAdd = document.getElementById('addVocab');
            const msgMeaning = document.getElementById('dictMeaning');
            const msgPinyin = document.getElementById('dictPinyin');
            const msgExample = document.getElementById('dictExample');
            const msgEnglish = document.getElementById('dictEnglish');

            modal.classList.remove('hidden');
            document.getElementById('dictWord').innerText = word;
            msgMeaning.innerText = "Analyzing...";
            msgPinyin.innerText = "---";
            msgExample.innerText = "---";
            msgEnglish.innerText = "---";
            btnAdd.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.MODELS.DICT}:generateContent?key=${userKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `中国語の単語「${word}」を調べ、JSON形式で返せ。日本語訳、ピンイン、例文、英単語3語を含むこと。
                        {"pinyin": "...", "meaning": "...", "example": "...", "english": ["word1", "word2", "word3"]}` }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await response.json();
                const res = JSON.parse(data.candidates[0].content.parts[0].text);
                msgPinyin.innerText = res.pinyin;
                msgMeaning.innerText = res.meaning;
                msgExample.innerText = res.example;
                msgEnglish.innerText = res.english.join(' / ');
                btnAdd.disabled = false;
                btnAdd.classList.remove('opacity-50', 'cursor-not-allowed');
                btnAdd.onclick = () => { addVocab(word, res); modal.classList.add('hidden'); };
            } catch (e) {
                msgMeaning.innerText = "Error searching word.";
            }
        }

        let vocabList = JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEYS.VOCAB) || "[]");
        function addVocab(word, res) {
            const clean = (s) => (s||"").toString().replace(/,/g, ' ');
            vocabList.unshift({ 
                id: Date.now(), 
                c1: `${clean(word)} (${clean(res.pinyin)})`, 
                c2: clean(res.meaning), 
                c3: `${clean(res.example)} / ${clean(res.english.join(' '))}` 
            });
            saveVocab();
        }
        function saveVocab() { localStorage.setItem(CONFIG.STORAGE_KEYS.VOCAB, JSON.stringify(vocabList)); renderVocab(); }
        function renderVocab() {
            const b = document.getElementById('vocabBody'), e = document.getElementById('vocabEmpty');
            if(!vocabList.length) { b.innerHTML=""; e.classList.remove('hidden'); return; }
            e.classList.add('hidden');
            b.innerHTML = vocabList.map(v => `<tr class="border-b border-slate-50 hover:bg-slate-50">
                <td class="p-5 font-bold chinese-text text-indigo-600">${v.c1}</td>
                <td class="p-5 text-sm font-bold text-slate-700">${v.c2}</td>
                <td class="p-5 text-[11px] text-slate-500">${v.c3}</td>
                <td class="p-5 text-right"><button onclick="delVocab(${v.id})" class="text-red-300 hover:text-red-600 text-xl font-bold">&times;</button></td>
            </tr>`).join('');
        }
        window.delVocab = (id) => { vocabList = vocabList.filter(v => v.id !== id); saveVocab(); };

        // --- UI Utils ---
        function toggleMainUI(isReading) {
            document.getElementById('rawInput').classList.toggle('hidden', isReading);
            document.getElementById('readableOutput').classList.toggle('hidden', !isReading);
            document.getElementById('processBtn').classList.toggle('hidden', isReading);
            document.getElementById('playerUI').classList.toggle('hidden', !isReading);
            document.getElementById('playModes').classList.toggle('hidden', !isReading);
            if(!isReading) document.getElementById('exportDataBtn').classList.add('hidden');
        }
        function updateControlIcons() {
            document.getElementById('iconPlay').classList.toggle('hidden', isPlaying);
            document.getElementById('iconPause').classList.toggle('hidden', !isPlaying);
        }
        function updateHighlight() {
            document.querySelectorAll('.segment').forEach(s => s.classList.remove('highlight-active'));
            document.getElementById(`seg-${currentIndex}`)?.classList.add('highlight-active');
        }
        function showLimitModal(msg) {
            const timeMatch = msg.match(/\d{1,2}:\d{2}:\d{2}/);
            document.getElementById('limitMsg').innerText = `API制限中です。解除予定: ${timeMatch ? timeMatch[0] : "不明"}`;
            document.getElementById('limitModal').classList.remove('hidden');
        }
        function startWebSpeechMode() {
            useWebSpeech = true;
            log("WebSpeechAPIモードに切り替えました", 'warn');
            seek(0);
        }

        // --- Timer ---
        let sT = 0, tI = null;
        document.getElementById('timerStart').onclick = () => {
            sT = Date.now(); document.getElementById('timerStart').disabled = true; document.getElementById('timerStop').disabled = false;
            tI = setInterval(() => {
                const el = Date.now()-sT, m=Math.floor(el/60000), s=Math.floor((el%60000)/1000), ms=Math.floor((el%1000)/100);
                document.getElementById('timerDisplay').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms}`;
            }, 100);
        };
        document.getElementById('timerStop').onclick = () => {
            clearInterval(tI); document.getElementById('timerStart').disabled = false; document.getElementById('timerStop').disabled = true;
            const c = (document.getElementById('rawInput').value.match(/[\u4e00-\u9fa5]/g) || []).length;
            const sec = (Date.now()-sT)/1000, cpm = Math.round(c/(sec/60));
            document.getElementById('resChars').innerText = c; document.getElementById('resTime').innerText = Math.round(sec)+"s";
            document.getElementById('resCPM').innerText = isFinite(cpm) ? cpm : 0; document.getElementById('resultBox').classList.remove('hidden');
        };

        // --- Event Listeners ---
        document.getElementById('processBtn').onclick = startProcessing;
        document.getElementById('btnPlay').onclick = () => isPlaying ? stopPlayback() : playPlayback();
        document.getElementById('btnStop').onclick = () => { stopPlayback(); toggleMainUI(false); document.getElementById('syncArea').classList.add('hidden'); };
        document.getElementById('btnPrev').onclick = () => seek(Math.max(0, currentIndex - 1));
        document.getElementById('btnNext').onclick = () => seek(Math.min(segments.length - 1, currentIndex + 1));
        document.getElementById('clearBtn').onclick = () => document.getElementById('rawInput').value = "";
        document.getElementById('zoomRange').oninput = (e) => { zoomScale = e.target.value; drawWaveform(); renderMarkers(); };
        document.getElementById('rateRange').oninput = (e) => document.getElementById('rateLabel').innerText = e.target.value + "x";
        document.getElementById('saveSettings').onclick = () => {
            const k = document.getElementById('apiKeyIn').value.trim();
            if(k) { userKey = k; localStorage.setItem(CONFIG.STORAGE_KEYS.API, k); document.getElementById('settingsModal').classList.add('hidden'); log("APIキー保存."); }
        };
        document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');
        document.getElementById('limitOk').onclick = () => { document.getElementById('limitModal').classList.add('hidden'); startWebSpeechMode(); };
        document.getElementById('closeDictBtn').onclick = () => document.getElementById('dictModal').classList.add('hidden');
        document.getElementById('cancelVocabBtn').onclick = () => document.getElementById('dictModal').classList.add('hidden');
        document.getElementById('exportCSV').onclick = () => {
            const csv = "Chinese,Japanese,Context\n" + vocabList.map(v => `${v.c1},${v.c2},${v.c3}`).join('\n');
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv])); a.download = 'vocab.csv'; a.click();
        };
        document.getElementById('clearVocab').onclick = () => { if(confirm("単語リストをすべて消去しますか？")) { vocabList=[]; saveVocab(); log("単語リストをクリアしました", "warn"); } };
        document.getElementById('exportDataBtn').onclick = exportDataAsZip;
        document.getElementById('importDataBtn').onclick = () => document.getElementById('dataInput').click();
        document.getElementById('dataInput').onchange = (e) => { if(e.target.files[0]) importZipData(e.target.files[0]); };

        // Log Draggable/Resizable
        const pnl = document.getElementById('logPanel'), hdr = document.getElementById('logHeader'), hnd = document.getElementById('logResizeHandle');
        document.getElementById('btnLogMin').onclick = () => pnl.classList.toggle('log-minimized');
        document.getElementById('btnLogClr').onclick = () => document.getElementById('logContent').innerHTML = "";
        document.getElementById('btnLogCopy').onclick = () => {
            const t = Array.from(document.getElementById('logContent').children).map(c => c.innerText).join('\n');
            navigator.clipboard.writeText(t).then(() => log("Logged copied.", 'success'));
        };
        let dgr=false, rsz=false;
        hdr.onmousedown = (e) => { if(e.target.tagName==='BUTTON') return; dgr=true; const ox=e.clientX-pnl.offsetLeft, oy=e.clientY-pnl.offsetTop;
            const mv=(ev)=>{ if(!dgr)return; pnl.style.left=(ev.clientX-ox)+'px'; pnl.style.top=(ev.clientY-oy)+'px'; pnl.style.bottom='auto'; pnl.style.right='auto'; };
            const up=()=>{ dgr=false; window.removeEventListener('mousemove',mv); }; window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
        };
        hnd.onmousedown = (e) => { rsz=true; const sw=pnl.offsetWidth, sh=pnl.offsetHeight, sx=e.clientX, sy=e.clientY, sl=pnl.offsetLeft, st=pnl.offsetTop;
            const mv=(ev)=>{ if(!rsz)return; pnl.style.width=(sw-(ev.clientX-sx))+'px'; pnl.style.height=(sh-(ev.clientY-sy))+'px'; pnl.style.left=(sl+(ev.clientX-sx))+'px'; pnl.style.top=(st+(ev.clientY-sy))+'px'; };
            const up=()=>{ rsz=false; window.removeEventListener('mousemove',mv); }; window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
        };

        // Context Menu Dictionary
        document.addEventListener('contextmenu', (e) => {
            const sel = window.getSelection().toString().trim();
            if (sel && /[\u4e00-\u9fa5]/.test(sel)) {
                e.preventDefault();
                const trg = document.getElementById('searchTrigger');
                trg.style.display = 'block'; trg.style.top = e.pageY + 'px'; trg.style.left = e.pageX + 'px';
                trg.onclick = () => { lookupWord(sel); trg.style.display = 'none'; };
            }
        });
        document.addEventListener('mousedown', (e) => { if(e.target.id !== 'searchTrigger') document.getElementById('searchTrigger').style.display = 'none'; });

        window.onload = () => { renderVocab(); log("Ready."); if(!userKey) document.getElementById('settingsModal').classList.remove('hidden'); };
    </script>
</body>
</html>
