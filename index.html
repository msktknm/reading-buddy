<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Chinese Reading Buddy Pro v16.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;700&family=Syne:wght@700;800&display=swap');
        :root { --indigo: #4f46e5; --indigo-dark: #3730a3; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; background: #fdfdfd; color: #1e293b; overflow-x: hidden; }
        .chinese-text { font-family: 'Noto Sans SC', serif; line-height: 2; }
        
        .segment { 
            transition: all 0.2s ease; 
            border-radius: 6px; 
            padding: 2px 4px; 
            display: inline; 
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .segment:hover { background: rgba(79, 70, 229, 0.05); }
        
        .highlight-active { 
            background: #fde047 !important; 
            border-bottom: 2px solid #eab308; 
            color: #000; 
            box-shadow: 0 2px 8px rgba(234, 179, 8, 0.3); 
        }

        .glass-panel { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .btn-shadow { box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.3); }
        
        #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 3000; }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4f46e5; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Log Panel (Draggable/Minimizable) */
        #logPanel {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 220px;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            padding: 8px;
            border-radius: 12px;
            z-index: 4000;
            font-family: monospace;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: height 0.3s;
        }
        #logContent {
            height: 150px;
            overflow-y: auto;
            font-size: 9px;
        }
        #logContent div { border-bottom: 1px solid rgba(0,255,0,0.1); padding: 2px 0; word-break: break-all; }
        .minimized #logContent { height: 0; overflow: hidden; }

        .spinner {
            border: 3px solid rgba(79, 70, 229, 0.1);
            border-left-color: #4f46e5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="logPanel">
        <div style="color: #fff; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 4px; cursor: pointer;" onclick="document.getElementById('logPanel').classList.toggle('minimized')">
            <span class="text-[10px]">v16.1 DEBUG LOG</span>
            <div class="flex gap-2">
                <button onclick="copyLogs(); event.stopPropagation()" class="bg-[#444] px-1.5 rounded text-[8px]">COPY</button>
                <span class="text-[8px]">▼</span>
            </div>
        </div>
        <div id="logContent"></div>
    </div>

    <nav class="sticky top-0 z-50 glass-panel border-b border-slate-100 px-4 py-3 mb-8">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <h1 class="text-xl font-black text-indigo-600 tracking-tight flex items-center gap-1">
                <span style="font-family: 'Syne', sans-serif;">READING BUDDY</span>
                <span class="text-[10px] bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded ml-1">PRO v16.1</span>
            </h1>
            <button id="openSettingsBtn" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-12">
        <section id="sectionMain" class="space-y-6">
            <div id="textContainer" class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 min-h-[350px] flex flex-col relative">
                <div class="flex justify-between items-center mb-3">
                    <label id="modeLabel" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Input Mode</label>
                    <div id="playbackOptions" class="hidden flex items-center gap-3">
                        <span class="text-[10px] font-bold text-slate-400">一区切りずつ停止</span>
                        <label class="switch">
                            <input type="checkbox" id="autoModeToggle" checked>
                            <span class="slider"></span>
                        </label>
                        <span class="text-[10px] font-bold text-indigo-600">連続再生</span>
                    </div>
                </div>

                <div class="relative flex-1 flex flex-col">
                    <textarea id="textInput" class="w-full h-full text-2xl leading-relaxed p-0 border-none focus:ring-0 placeholder:text-slate-300 resize-none chinese-text overflow-y-auto" placeholder="ここに中国語を入力してください..."></textarea>
                    <div id="readerDisplay" class="hidden w-full h-full text-2xl leading-relaxed p-0 border-none chinese-text overflow-y-auto break-words whitespace-pre-wrap text-slate-800"></div>
                </div>
                
                <div id="inputFooter" class="flex justify-between mt-4 pt-4 border-t border-slate-50">
                    <div id="editHint" class="hidden text-[10px] font-bold text-slate-400 self-center">
                        クリックで再生開始 / なぞって単語検索
                    </div>
                    <div class="flex-1"></div>
                    <button id="clearTextBtn" class="flex items-center gap-1.5 text-xs font-bold text-red-400 hover:text-red-600 transition-colors py-2 px-3 rounded-xl hover:bg-red-50">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        テキストを消去
                    </button>
                </div>
            </div>

            <button id="startReadBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl shadow-xl btn-shadow transition-all active:scale-95 text-lg">
                読み上げを開始する
            </button>

            <div id="playerControls" class="hidden space-y-6">
                <div class="flex items-center justify-center gap-6">
                    <button id="prevBtn" class="w-14 h-14 flex items-center justify-center bg-slate-100 rounded-full hover:bg-slate-200 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <button id="playBtn" class="w-20 h-20 flex items-center justify-center bg-indigo-600 text-white rounded-full shadow-2xl btn-shadow hover:scale-105 transition-all">
                        <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="pauseIcon" xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button id="stopBtn" class="w-14 h-14 flex items-center justify-center bg-slate-800 text-white rounded-full hover:bg-black transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>

                <div class="bg-white rounded-2xl p-4 border border-slate-100 flex items-center gap-4 max-w-sm mx-auto">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Speed</span>
                    <input type="range" id="rateRange" min="0.4" max="1.4" step="0.1" value="0.7" class="flex-1 h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                </div>
            </div>
        </section>

        <section id="sectionTimer" class="space-y-6 text-center">
            <h2 class="text-xs font-black text-slate-300 uppercase tracking-widest">Speed Timer</h2>
            <div class="bg-white rounded-[40px] p-8 shadow-sm border border-slate-100 max-w-md mx-auto">
                <div id="currentTime" class="text-6xl font-black tracking-tighter tabular-nums text-slate-800 mb-6" style="font-family: 'Syne', sans-serif;">00:00.0</div>
                <div class="flex justify-center gap-4">
                    <button id="timerStartBtn" onclick="startTimer()" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg btn-shadow active:scale-95 transition-all">START</button>
                    <button id="timerStopBtn" onclick="stopTimer()" disabled class="bg-slate-200 text-slate-400 px-8 py-3 rounded-2xl font-black cursor-not-allowed transition-all">STOP</button>
                </div>
            </div>
            <div id="resultCard" class="hidden bg-indigo-600 rounded-3xl p-6 text-white max-w-md mx-auto">
                <div class="grid grid-cols-3 gap-4">
                    <div><div class="text-[10px] font-black opacity-60 uppercase">Chars</div><div id="charCount" class="text-xl font-black">0</div></div>
                    <div><div class="text-[10px] font-black opacity-60 uppercase">Time</div><div id="finalTime" class="text-xl font-black">0s</div></div>
                    <div><div class="text-[10px] font-black opacity-60 uppercase">CPM</div><div id="cpmResult" class="text-xl font-black">0</div></div>
                </div>
            </div>
        </section>

        <section id="sectionVocab" class="space-y-6">
            <div class="flex items-center justify-between">
                <h2 class="text-2xl font-black tracking-tight">MY LIST</h2>
                <div class="flex gap-2">
                    <button id="exportCSV" class="text-xs font-black bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl hover:bg-indigo-100 transition-colors">CSV COPY</button>
                    <button id="clearAllVocab" class="text-xs font-black bg-red-50 text-red-400 px-4 py-2 rounded-xl hover:bg-red-100 transition-colors">CLEAR ALL</button>
                </div>
            </div>
            <div class="bg-white rounded-3xl border border-slate-100 overflow-hidden shadow-sm overflow-x-auto">
                <table class="w-full text-left min-w-[700px]">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Word (Pinyin)</th>
                            <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Meaning (JP)</th>
                            <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Details (Example & EN)</th>
                            <th class="p-4 w-10"></th>
                        </tr>
                    </thead>
                    <tbody id="vocabTableBody"></tbody>
                </table>
                <div id="emptyState" class="p-16 text-center">
                    <p class="text-slate-300 font-bold uppercase tracking-widest text-xs">リストは空です</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Modals -->
    <div id="settingsModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white rounded-[40px] w-full max-w-sm p-8 space-y-6 shadow-2xl relative">
            <h3 class="text-2xl font-black text-slate-800 tracking-tight">Settings</h3>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Gemini API Key</label>
                <input type="password" id="apiKeyInput" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-indigo-500" placeholder="Enter API Key...">
            </div>
            <div class="flex gap-3 pt-2">
                <button id="saveSettingsBtn" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black btn-shadow">SAVE</button>
                <button id="closeSettingsBtn" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-black">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="dictModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[40px] w-full max-w-lg p-8 space-y-6 shadow-2xl relative">
            <button id="closeDictBtn" class="absolute top-6 right-6 text-slate-300 hover:text-slate-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <div id="dictLoading" class="hidden flex flex-col items-center py-10 space-y-4">
                <div class="spinner"></div>
                <p class="text-xs font-black text-slate-400 tracking-widest uppercase">Analyzing...</p>
            </div>
            <div id="dictContent" class="space-y-6">
                <div class="flex items-baseline justify-between pt-4 gap-4">
                    <div class="space-y-1">
                        <h3 id="dictWord" class="text-5xl font-black text-indigo-600 tracking-tighter">...</h3>
                        <p id="dictPinyin" class="text-lg font-bold text-slate-400 italic">...</p>
                    </div>
                    <div class="text-right">
                        <label class="text-[10px] font-black text-slate-300 uppercase tracking-widest block">English</label>
                        <p id="dictEng" class="text-xl font-black text-slate-800 tracking-tight">...</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="space-y-1"><label class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Meaning</label><div id="dictMean" class="text-lg font-bold leading-tight text-slate-700">...</div></div>
                    <div class="space-y-1"><label class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Example (CN)</label><div id="dictExCn" class="text-sm font-bold leading-relaxed text-slate-800 bg-slate-50 p-3 rounded-2xl chinese-text">...</div></div>
                    <div class="space-y-1"><label class="text-[10px] font-black text-slate-300 uppercase tracking-widest">JP Translation</label><div id="dictExJp" class="text-xs font-bold leading-relaxed text-slate-400 px-3 italic">...</div></div>
                </div>
                <button id="addToListBtn" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-xl btn-shadow transition-all">単語帳に追加</button>
            </div>
        </div>
    </div>

    <div id="selectionMenu" class="fixed hidden glass-panel border border-indigo-200 px-6 py-3 rounded-full shadow-2xl z-50">
        <button id="lookUpBtn" class="text-sm font-black text-indigo-600 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /></svg>
            単語を調べる
        </button>
    </div>

    <div id="toast" class="bg-slate-900 text-white px-8 py-4 rounded-3xl text-[10px] font-black shadow-2xl tracking-widest uppercase">Message</div>

    <script>
        // ---------------------------------------------------------
        //  LOGGING & DEBUGGING
        // ---------------------------------------------------------
        function addLog(msg, type = 'info') {
            const container = document.getElementById('logContent');
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString().split(' ')[0];
            entry.innerHTML = `<span style="opacity:0.5">[${time}]</span> <span style="color:${type==='error'?'#f87171':'#4ade80'}">${msg}</span>`;
            container.prepend(entry);
            if (container.children.length > 50) container.removeChild(container.lastChild);
        }

        function copyLogs() {
            const text = Array.from(document.getElementById('logContent').children).map(c=>c.innerText).join('\n');
            const el = document.createElement('textarea');
            el.value = text; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            showToast("LOGS COPIED");
        }

        // ---------------------------------------------------------
        //  SPEECH ENGINE (v16.1 ULTRA RECOVERY)
        // ---------------------------------------------------------
        const synth = window.speechSynthesis;
        let isPlaying = false;
        let currentIndex = 0;
        let segments = [];
        let currentUtterance = null;

        function speak() {
            if (!isPlaying || currentIndex >= segments.length) {
                isPlaying = false;
                updateIcons();
                return;
            }

            // iOS等でキューが詰まるのを防ぐため、一度キャンセルするが、
            // その後のspeak呼び出しを確実に行うためのフラグ管理を徹底
            if (synth.speaking) {
                synth.cancel();
                // cancel後に少し待たないと次のspeakが無視される場合がある
                setTimeout(initUtterance, 100);
                return;
            }
            initUtterance();
        }

        function initUtterance() {
            const text = segments[currentIndex];
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = parseFloat(rateRange.value);
            currentUtterance = utterance;

            updateHighlight(currentIndex);
            addLog(`Start: [${currentIndex}]`);

            utterance.onstart = () => {
                // 発話が実際に始まったことを記録
            };

            utterance.onend = () => {
                if (isPlaying) {
                    currentIndex++;
                    if (autoModeToggle.checked && currentIndex < segments.length) {
                        speak();
                    } else {
                        isPlaying = false;
                        updateIcons();
                    }
                }
            };

            utterance.onerror = (e) => {
                // 手動キャンセルの場合は無視
                if (e.error === 'interrupted' || e.error === 'canceled') {
                    addLog(`Speech interrupted: [${currentIndex}]`);
                    return;
                }
                addLog(`Error: ${e.error}`, "error");
                isPlaying = false;
                updateIcons();
            };

            synth.speak(utterance);
        }

        function stopSpeech() {
            addLog("Stop Requested");
            isPlaying = false;
            synth.cancel();
            updateIcons();
        }

        // ---------------------------------------------------------
        //  UI HANDLERS
        // ---------------------------------------------------------
        const textInput = document.getElementById('textInput');
        const readerDisplay = document.getElementById('readerDisplay');
        const startReadBtn = document.getElementById('startReadBtn');
        const playerControls = document.getElementById('playerControls');
        const playbackOptions = document.getElementById('playbackOptions');
        const autoModeToggle = document.getElementById('autoModeToggle');
        const rateRange = document.getElementById('rateRange');
        const vocabTableBody = document.getElementById('vocabTableBody');
        const dictModal = document.getElementById('dictModal');
        const settingsModal = document.getElementById('settingsModal');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const selectionMenu = document.getElementById('selectionMenu');

        let vocabList = JSON.parse(localStorage.getItem('crb_pro_vocab_v5') || '[]');
        let geminiApiKey = localStorage.getItem('crb_gemini_key') || "";
        apiKeyInput.value = geminiApiKey;

        startReadBtn.onclick = () => {
            const raw = textInput.value.trim();
            if (!raw) return showToast("INPUT TEXT");
            segments = raw.match(/([^，。！？；：\n]+[，。！？；：\n]*)/g) || [raw];
            currentIndex = 0;
            renderReader();
            setMode('reading');
            isPlaying = true;
            speak();
        };

        function setMode(mode) {
            if (mode === 'reading') {
                textInput.classList.add('hidden');
                readerDisplay.classList.remove('hidden');
                startReadBtn.classList.add('hidden');
                playerControls.classList.remove('hidden');
                playbackOptions.classList.remove('hidden');
                document.getElementById('modeLabel').innerText = "Reading Mode";
                document.getElementById('editHint').classList.remove('hidden');
                document.getElementById('clearTextBtn').classList.add('hidden');
            } else {
                stopSpeech();
                textInput.classList.remove('hidden');
                readerDisplay.classList.add('hidden');
                startReadBtn.classList.remove('hidden');
                playerControls.classList.add('hidden');
                playbackOptions.classList.add('hidden');
                document.getElementById('modeLabel').innerText = "Input Mode";
                document.getElementById('editHint').classList.add('hidden');
                document.getElementById('clearTextBtn').classList.remove('hidden');
            }
        }

        function renderReader() {
            readerDisplay.innerHTML = segments.map((s, i) => `<span class="segment" data-idx="${i}">${s}</span>`).join('');
            readerDisplay.querySelectorAll('.segment').forEach(el => {
                el.onclick = () => {
                    if (window.getSelection().toString().trim()) return;
                    stopSpeech();
                    currentIndex = parseInt(el.dataset.idx);
                    isPlaying = true;
                    // 少し遅延させて確実に前の発話を終わらせる
                    setTimeout(speak, 50);
                };
            });
        }

        playBtn.onclick = () => {
            if (isPlaying) { stopSpeech(); }
            else { isPlaying = true; if (currentIndex >= segments.length) currentIndex = 0; speak(); }
        };

        function updateIcons() {
            document.getElementById('playIcon').classList.toggle('hidden', isPlaying);
            document.getElementById('pauseIcon').classList.toggle('hidden', !isPlaying);
        }

        function updateHighlight(idx) {
            readerDisplay.querySelectorAll('.segment').forEach(el => el.classList.remove('highlight-active'));
            const target = readerDisplay.querySelector(`.segment[data-idx="${idx}"]`);
            if (target) {
                target.classList.add('highlight-active');
                target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // ---------------------------------------------------------
        //  DICTIONARY (v16.1 API FIX)
        // ---------------------------------------------------------
        document.addEventListener('selectionchange', () => {
            const sel = window.getSelection().toString().trim();
            if (!sel || sel.length > 20) { selectionMenu.classList.add('hidden'); return; }
            const range = window.getSelection().getRangeAt(0);
            if (readerDisplay.contains(range.commonAncestorContainer) || textInput.contains(range.commonAncestorContainer)) {
                const rect = range.getBoundingClientRect();
                selectionMenu.style.left = `${Math.min(window.innerWidth - 160, rect.left + window.scrollX)}px`;
                selectionMenu.style.top = `${rect.top + window.scrollY - 50}px`;
                selectionMenu.classList.remove('hidden');
                selectionMenu.dataset.word = sel;
            }
        });

        document.getElementById('lookUpBtn').onclick = () => {
            const word = selectionMenu.dataset.word;
            selectionMenu.classList.add('hidden');
            openDictionary(word);
        };

        async function openDictionary(word) {
            if (!geminiApiKey) return showToast("API KEY REQUIRED");
            dictModal.classList.remove('hidden');
            const loading = document.getElementById('dictLoading');
            const content = document.getElementById('dictContent');
            loading.classList.remove('hidden');
            content.classList.add('hidden');

            addLog(`AI Query: ${word}`);
            // 404対策としてモデル名をより汎用的なものに変更
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiApiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Analyze Chinese word: "${word}". Output JSON.` }] }],
                        systemInstruction: { parts: [{ text: "Return JSON ONLY: {pinyin, meaning, english, exampleCn, exampleJp}" }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) {
                    addLog(`API HTTP Error: ${response.status}`, "error");
                    throw new Error(`API ${response.status}`);
                }

                const data = await response.json();
                const rawResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (!rawResult) throw new Error("Empty Response");

                const res = JSON.parse(rawResult);
                document.getElementById('dictWord').innerText = word;
                document.getElementById('dictPinyin').innerText = res.pinyin || "-";
                document.getElementById('dictEng').innerText = res.english || "-";
                document.getElementById('dictMean').innerText = res.meaning || "-";
                document.getElementById('dictExCn').innerText = res.exampleCn || "-";
                document.getElementById('dictExJp').innerText = res.exampleJp || "-";
                
                loading.classList.add('hidden');
                content.classList.remove('hidden');
                addLog(`AI Success: ${word}`);
            } catch (err) {
                addLog(`Dict Error: ${err.message}`, "error");
                dictModal.classList.add('hidden');
                showToast("FAILED: Check Logs");
            }
        }

        document.getElementById('addToListBtn').onclick = () => {
            vocabList.unshift({
                word: document.getElementById('dictWord').innerText,
                pinyin: document.getElementById('dictPinyin').innerText,
                english: document.getElementById('dictEng').innerText,
                meaning: document.getElementById('dictMean').innerText,
                exampleCn: document.getElementById('dictExCn').innerText,
                exampleJp: document.getElementById('dictExJp').innerText
            });
            saveVocab();
            dictModal.classList.add('hidden');
            showToast("SAVED");
        };

        // ---------------------------------------------------------
        //  SUPPORTING FUNCTIONS
        // ---------------------------------------------------------
        function saveVocab() {
            localStorage.setItem('crb_pro_vocab_v5', JSON.stringify(vocabList));
            renderVocabTable();
        }

        function renderVocabTable() {
            if (vocabList.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                vocabTableBody.innerHTML = '';
            } else {
                document.getElementById('emptyState').classList.add('hidden');
                vocabTableBody.innerHTML = vocabList.map((item, i) => `
                    <tr class="border-b border-slate-50">
                        <td class="p-4">
                            <div class="font-black text-indigo-600 text-lg cursor-pointer" onclick="openDictionary('${item.word}')">${item.word}</div>
                            <div class="text-[10px] font-bold text-slate-400 italic">${item.pinyin}</div>
                        </td>
                        <td class="p-4 font-bold text-xs text-slate-600">${item.meaning}</td>
                        <td class="p-4">
                            <div class="text-sm text-slate-800 chinese-text">${item.exampleCn}</div>
                            <div class="text-[10px] text-slate-400">JP: ${item.exampleJp}</div>
                        </td>
                        <td class="p-4 text-right"><button onclick="deleteItem(${i})" class="text-slate-300 hover:text-red-500 text-xl">×</button></td>
                    </tr>
                `).join('');
            }
        }

        window.deleteItem = (i) => { vocabList.splice(i, 1); saveVocab(); };
        document.getElementById('clearAllVocab').onclick = () => { if(confirm("CLEAR ALL?")) { vocabList = []; saveVocab(); } };
        document.getElementById('clearTextBtn').onclick = () => { textInput.value = ''; showToast("CLEARED"); };
        document.getElementById('stopBtn').onclick = () => setMode('input');
        document.getElementById('closeDictBtn').onclick = () => dictModal.classList.add('hidden');
        document.getElementById('prevBtn').onclick = () => { if(currentIndex > 0) { currentIndex--; speak(); } };
        document.getElementById('openSettingsBtn').onclick = () => settingsModal.classList.remove('hidden');
        document.getElementById('closeSettingsBtn').onclick = () => settingsModal.classList.add('hidden');
        document.getElementById('saveSettingsBtn').onclick = () => {
            geminiApiKey = apiKeyInput.value.trim();
            localStorage.setItem('crb_gemini_key', geminiApiKey);
            settingsModal.classList.add('hidden');
            showToast("SAVED");
        };

        document.getElementById('exportCSV').onclick = () => {
            if (vocabList.length === 0) return showToast("EMPTY");
            const csv = vocabList.map(v => `"${v.word}(${v.pinyin})","${v.meaning}","${v.exampleCn} / ${v.exampleJp}"`).join('\n');
            const el = document.createElement('textarea');
            el.value = csv; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            showToast("CSV COPIED");
        };

        let startTime, timerInterval;
        function startTimer() {
            startTime = Date.now();
            document.getElementById('timerStartBtn').disabled = true;
            document.getElementById('timerStopBtn').disabled = false;
            document.getElementById('timerStopBtn').className = "bg-red-500 text-white px-8 py-3 rounded-2xl font-black";
            document.getElementById('resultCard').classList.add('hidden');
            timerInterval = setInterval(() => {
                const ms = Date.now() - startTime;
                document.getElementById('currentTime').innerText = `00:${Math.floor(ms/1000).toString().padStart(2,'0')}.${Math.floor((ms%1000)/100)}`;
            }, 100);
        }
        function stopTimer() {
            clearInterval(timerInterval);
            const ms = Date.now() - startTime;
            const charCount = (textInput.value.match(/[\u4e00-\u9fa5]/g) || []).length;
            const cpm = Math.round(charCount / (ms / 60000));
            document.getElementById('charCount').innerText = charCount;
            document.getElementById('finalTime').innerText = (ms/1000).toFixed(1)+'s';
            document.getElementById('cpmResult').innerText = isFinite(cpm) ? cpm : '-';
            document.getElementById('timerStartBtn').disabled = false;
            document.getElementById('timerStopBtn').disabled = true;
            document.getElementById('timerStopBtn').className = "bg-slate-200 text-slate-400 px-8 py-3 rounded-2xl font-black";
            document.getElementById('resultCard').classList.remove('hidden');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        window.onload = renderVocabTable;
    </script>
</body>
</html>
