<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chinese Reading Buddy Pro v62.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Edge TTS Browser Support (Using Module for ESM compatibility) -->
    <script type="module">
        import { EdgeTTS } from 'https://cdn.jsdelivr.net/npm/edge-tts-browser@1.0.1/index.min.js';
        window.EdgeTTS = EdgeTTS;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;700&family=Syne:wght@700;800&display=swap');
        :root { --indigo: #4f46e5; --indigo-dark: #3730a3; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background: #fdfdfd; 
            color: #1e293b; 
            overflow-x: hidden;
            width: 100%;
        }
        .chinese-text { font-family: 'Noto Sans SC', serif; line-height: 2.2; }
        .glass-panel { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        #logPanel { position: fixed; bottom: 10px; right: 10px; width: 340px; background: rgba(15, 23, 42, 0.98); color: #4ade80; padding: 10px; border-radius: 12px; z-index: 5000; font-family: monospace; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
        #logContent { height: 180px; overflow-y: auto; font-size: 10px; display: flex; flex-direction: column-reverse; }
        .minimized#logPanel { width: 140px; height: 32px; overflow: hidden; }
        .minimized #logContent { display: none; }
        
        .spinner { border: 3px solid rgba(79, 70, 229, 0.1); border-left-color: #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="min-h-screen pb-32 w-full">

    <div id="loadingOverlay">
        <div class="w-64 space-y-4 text-center">
            <div class="spinner mx-auto mb-4"></div>
            <div id="loadingStatus" class="text-[10px] font-black text-indigo-600 uppercase tracking-widest italic">Process Starting...</div>
        </div>
    </div>

    <!-- LOG PANEL -->
    <div id="logPanel" class="minimized" onclick="if(event.target.tagName !== 'BUTTON') this.classList.toggle('minimized')">
        <div class="flex justify-between items-center cursor-pointer mb-1">
            <span class="text-[10px] font-bold text-white uppercase tracking-wider">PROCESS LOG v62.0</span>
            <button id="clearLogBtn" class="bg-slate-700 text-white px-2 py-0.5 rounded text-[10px] font-bold">CLEAR</button>
        </div>
        <div id="logContent"></div>
    </div>

    <nav class="sticky top-0 z-[100] glass-panel px-4 py-2 w-full">
        <div class="flex items-center justify-between w-full max-w-full">
            <div class="flex flex-col items-start leading-none gap-0.5">
                <h1 class="text-base sm:text-lg font-black text-indigo-600 tracking-tighter" style="font-family: 'Syne', sans-serif;">READING BUDDY</h1>
                <span class="text-[9px] bg-indigo-600 text-white px-1.5 py-0.5 rounded-sm font-black tracking-tighter">PRO v62.0 (Hybrid TTS)</span>
            </div>
            <button id="openSettingsBtn" class="p-2.5 text-slate-500 hover:text-indigo-600 transition-all bg-white shadow-sm border border-slate-100 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
            </button>
        </div>
    </nav>

    <main class="w-full px-4 py-4 space-y-8 mt-2">
        <section id="sectionMain" class="space-y-4">
            <div id="textContainer" class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 flex flex-col min-h-[400px]">
                <div class="flex justify-between items-center mb-3">
                    <label id="modeLabel" class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Input Mode</label>
                </div>
                <textarea id="textInput" rows="12" class="w-full text-xl leading-relaxed p-0 border-none focus:ring-0 placeholder:text-slate-300 resize-none chinese-text flex-1" placeholder="中国語を入力してください..."></textarea>
                <div id="readerDisplay" class="hidden w-full text-xl leading-relaxed p-0 chinese-text break-words whitespace-pre-wrap text-slate-800 flex-1"></div>
                <div id="inputFooter" class="flex justify-between mt-3 pt-3 border-t border-slate-50">
                    <button id="clearTextBtn" class="text-[10px] font-bold text-red-400">テキスト消去</button>
                </div>
            </div>
            
            <button id="startReadBtn" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-[0.98]">読み上げを開始する</button>

            <div id="playerControls" class="hidden space-y-4">
                <div class="flex items-center justify-center gap-6">
                    <button id="prevBtn" class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center font-bold">←</button>
                    <button id="playBtn" class="w-20 h-20 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center">
                        <span id="playIcon" class="text-2xl">▶</span><span id="pauseIcon" class="hidden text-2xl">||</span>
                    </button>
                    <button id="stopBtn" class="w-12 h-12 bg-slate-800 text-white rounded-full flex items-center justify-center font-bold">×</button>
                    <button id="nextBtn" class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center font-bold">→</button>
                </div>
                <div class="bg-white rounded-2xl p-4 border border-slate-100 flex items-center gap-4">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Speed</span>
                    <input type="range" id="rateRange" min="0.5" max="2.0" step="0.1" value="1.0" class="flex-1 accent-indigo-600">
                </div>
            </div>
        </section>

        <section id="sectionTimer" class="space-y-4 text-center">
            <h2 class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Reading Timer & CPM</h2>
            <div class="bg-white rounded-3xl p-8 border border-slate-100">
                <div id="currentTime" class="text-5xl font-black text-slate-800 mb-6" style="font-family: 'Syne', sans-serif;">00:00.0</div>
                <div class="flex gap-3">
                    <button id="timerStartBtn" class="flex-1 bg-indigo-600 text-white py-3.5 rounded-xl font-black">START</button>
                    <button id="timerStopBtn" disabled class="flex-1 bg-slate-200 text-slate-400 py-3.5 rounded-xl font-black">STOP</button>
                </div>
            </div>
            <div id="resultCard" class="hidden bg-indigo-600 rounded-2xl p-6 text-white shadow-xl">
                <div class="grid grid-cols-3 gap-4">
                    <div><div class="text-[8px] font-black opacity-60 mb-1">Chars</div><div id="charCount" class="text-xl font-black">0</div></div>
                    <div><div class="text-[8px] font-black opacity-60 mb-1">Time</div><div id="finalTime" class="text-xl font-black">0s</div></div>
                    <div><div class="text-[8px] font-black opacity-60 mb-1">CPM</div><div id="cpmResult" class="text-xl font-black">0</div></div>
                </div>
            </div>
        </section>

        <section id="sectionVocab" class="space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="text-xl font-black italic">VOCAB LIST</h2>
                <button id="clearAllVocab" class="text-[9px] font-black bg-red-50 text-red-400 px-3 py-2 rounded-lg">CLEAR ALL</button>
            </div>
            <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
                <table class="w-full text-left"><tbody id="vocabTableBody"></tbody></table>
                <div id="emptyState" class="p-10 text-center text-slate-300 text-[9px] font-black uppercase tracking-widest">List Empty</div>
            </div>
        </section>
    </main>

    <!-- API Key Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden z-[20000] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-5 shadow-2xl">
            <h3 class="text-xl font-black text-slate-800">API Settings</h3>
            <div class="space-y-1.5">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Gemini API Key</label>
                <input type="password" id="apiKeyInput" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-xs outline-none" placeholder="APIキーを入力してください...">
                <p class="text-[8px] text-slate-400">※キーはブラウザにのみ保存されます</p>
            </div>
            <button id="saveSettingsBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-lg">設定を保存する</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl text-[9px] font-black shadow-2xl tracking-widest uppercase opacity-0 transition-opacity pointer-events-none z-[30000]">Message</div>

    <script>
        // Global State
        let userApiKey = localStorage.getItem('crb_gemini_key') || "";
        let isPlaying = false;
        let activeAudio = null;
        let timerInterval = null;
        let startTime = 0;
        let pendingAction = null;

        // Logging Utility
        function addLog(msg, type = 'info') {
            const container = document.getElementById('logContent');
            const entry = document.createElement('div');
            entry.className = "py-0.5 border-b border-white/5 leading-tight";
            let color = "#4ade80"; // green
            if (type === 'error') color = "#f87171"; // red
            if (type === 'warn') color = "#fbbf24"; // yellow
            
            const time = new Date().toLocaleTimeString('ja-JP', { hour12: false });
            entry.innerHTML = `<span style="opacity:0.4">[${time}]</span> <span style="color:${color}">${msg}</span>`;
            container.prepend(entry);
        }

        // PCM to WAV conversion for Gemini TTS (audio/L16)
        function createWavHeader(dataLength, sampleRate) {
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, dataLength, true);
            return header;
        }

        // --- Core Audio Process ---

        async function playBase64Audio(base64Data, mimeType) {
            try {
                addLog("[AUDIO] データデコード中...");
                const binary = atob(base64Data);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

                let finalBlob;
                if (mimeType.includes('L16')) {
                    const sampleRate = parseInt(mimeType.split('rate=')[1]) || 24000;
                    const header = createWavHeader(bytes.length, sampleRate);
                    finalBlob = new Blob([header, bytes], { type: 'audio/wav' });
                } else {
                    finalBlob = new Blob([bytes], { type: mimeType });
                }

                if (activeAudio) activeAudio.pause();
                const url = URL.createObjectURL(finalBlob);
                activeAudio = new Audio(url);
                activeAudio.playbackRate = parseFloat(document.getElementById('rateRange').value);
                
                activeAudio.onplay = () => { isPlaying = true; updateUIPlayback(); addLog("[PLAYER] 再生開始。"); };
                activeAudio.onended = () => { isPlaying = false; updateUIPlayback(); addLog("[PLAYER] 再生完了。"); };
                
                await activeAudio.play();
                return true;
            } catch (e) {
                addLog("[AUDIO ERROR] デコードまたは再生失敗: " + e.message, 'error');
                return false;
            }
        }

        async function fetchGeminiTTS(model, text) {
            addLog(`[API] ${model} リクエスト送信中...`);
            let retryCount = 0;

            const makeRequest = async () => {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${userApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });

                if (response.status === 429) {
                    if (retryCount < 1) {
                        retryCount++;
                        addLog("[API] レート制限(429)検知。8秒後に1度だけ再試行します...", 'warn');
                        await new Promise(r => setTimeout(r, 8000));
                        return await makeRequest();
                    }
                    throw new Error("RATE_LIMIT");
                }
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            };

            try {
                const data = await makeRequest();
                const part = data.candidates?.[0]?.content?.parts?.[0];
                if (part?.inlineData) {
                    addLog(`[SUCCESS] ${model} 音声生成成功。`);
                    return await playBase64Audio(part.inlineData.data, part.inlineData.mimeType);
                }
                throw new Error("AUDIO_NOT_FOUND");
            } catch (e) {
                addLog(`[FAIL] ${model}: ${e.message}`, 'error');
                return false;
            }
        }

        async function fetchEdgeTTS(text) {
            addLog("[EDGE-TTS] ライブラリを使用して生成開始...");
            try {
                if (typeof window.EdgeTTS !== 'function') {
                    throw new Error("ライブラリがまだロードされていません。");
                }
                const tts = new window.EdgeTTS();
                addLog("[EDGE-TTS] ボイス 'zh-CN-XiaoxiaoNeural' をリクエスト中...");
                const audioBlob = await tts.getAudio(text, "zh-CN-XiaoxiaoNeural");
                addLog("[EDGE-TTS] Blob生成完了。再生準備中...");
                
                if (activeAudio) activeAudio.pause();
                const audioUrl = URL.createObjectURL(audioBlob);
                activeAudio = new Audio(audioUrl);
                activeAudio.playbackRate = parseFloat(document.getElementById('rateRange').value);
                
                activeAudio.onplay = () => { isPlaying = true; updateUIPlayback(); addLog("[EDGE-TTS] 再生開始。"); };
                activeAudio.onended = () => { isPlaying = false; updateUIPlayback(); addLog("[EDGE-TTS] 再生完了。"); };
                
                await activeAudio.play();
                return true;
            } catch (e) {
                addLog("[EDGE-TTS ERROR] 生成失敗: " + e.message, 'error');
                return false;
            }
        }

        async function startTtsPipeline(text) {
            if (!userApiKey) {
                addLog("[AUTH] APIキーが設定されていません。モーダルを表示します。", 'warn');
                pendingAction = () => startTtsPipeline(text);
                document.getElementById('settingsModal').classList.remove('hidden');
                return;
            }

            const overlay = document.getElementById('loadingOverlay');
            const status = document.getElementById('loadingStatus');
            overlay.style.display = 'flex';
            
            // Step 1: Candidate 1 (Native Audio)
            status.innerText = "GENERATE: NATIVE-AUDIO...";
            let success = await fetchGeminiTTS('gemini-2.5-flash-native-audio-latest', text);

            // Step 2: Candidate 2 (Preview TTS)
            if (!success) {
                status.innerText = "GENERATE: PREVIEW-TTS...";
                success = await fetchGeminiTTS('gemini-2.5-flash-preview-tts', text);
            }

            // Step 3: Candidate 3 (Edge-TTS)
            if (!success) {
                status.innerText = "GENERATE: MICROSOFT EDGE...";
                success = await fetchEdgeTTS(text);
            }

            if (!success) {
                addLog("[PIPELINE] 全ての生成手段が失敗しました。", 'error');
                showToast("音声生成に失敗しました");
            }

            overlay.style.display = 'none';
        }

        // --- UI & Interaction ---

        function updateUIPlayback() {
            document.getElementById('playIcon').classList.toggle('hidden', isPlaying);
            document.getElementById('pauseIcon').classList.toggle('hidden', !isPlaying);
        }

        document.getElementById('startReadBtn').onclick = () => {
            const text = document.getElementById('textInput').value.trim();
            if (!text) return;

            addLog("[SYSTEM] 読み上げ処理を開始。");
            document.getElementById('textInput').classList.add('hidden');
            document.getElementById('readerDisplay').classList.remove('hidden');
            document.getElementById('readerDisplay').innerText = text;
            document.getElementById('startReadBtn').classList.add('hidden');
            document.getElementById('playerControls').classList.remove('hidden');
            document.getElementById('modeLabel').innerText = "Reading Mode";

            startTtsPipeline(text);
        };

        document.getElementById('playBtn').onclick = () => {
            if (!activeAudio) return;
            if (isPlaying) {
                activeAudio.pause();
                isPlaying = false;
            } else {
                activeAudio.play();
                isPlaying = true;
            }
            updateUIPlayback();
        };

        document.getElementById('stopBtn').onclick = () => {
            if (activeAudio) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
            }
            isPlaying = false;
            updateUIPlayback();
            
            document.getElementById('textInput').classList.remove('hidden');
            document.getElementById('readerDisplay').classList.add('hidden');
            document.getElementById('startReadBtn').classList.remove('hidden');
            document.getElementById('playerControls').classList.add('hidden');
            document.getElementById('modeLabel').innerText = "Input Mode";
            addLog("[SYSTEM] 読み上げ停止。");
        };

        document.getElementById('rateRange').oninput = (e) => {
            const val = parseFloat(e.target.value);
            if (activeAudio) activeAudio.playbackRate = val;
            addLog(`[PLAYER] 再生速度を ${val}x に変更。`);
        };

        // Timer Logic
        document.getElementById('timerStartBtn').onclick = () => {
            startTime = Date.now();
            document.getElementById('timerStartBtn').disabled = true;
            document.getElementById('timerStopBtn').disabled = false;
            document.getElementById('timerStopBtn').classList.replace('bg-slate-200', 'bg-red-500');
            document.getElementById('timerStopBtn').classList.replace('text-slate-400', 'text-white');
            
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                const m = Math.floor(elapsed / 60);
                const s = Math.floor(elapsed % 60);
                const ms = Math.floor((elapsed % 1) * 10);
                document.getElementById('currentTime').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms}`;
            }, 100);
        };

        document.getElementById('timerStopBtn').onclick = () => {
            clearInterval(timerInterval);
            const elapsed = (Date.now() - startTime) / 1000;
            const text = document.getElementById('textInput').value.trim();
            const charCount = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
            const cpm = Math.round(charCount / (elapsed / 60)) || 0;

            document.getElementById('charCount').innerText = charCount;
            document.getElementById('finalTime').innerText = elapsed.toFixed(1) + 's';
            document.getElementById('cpmResult').innerText = cpm;
            document.getElementById('resultCard').classList.remove('hidden');

            document.getElementById('timerStartBtn').disabled = false;
            document.getElementById('timerStopBtn').disabled = true;
            document.getElementById('timerStopBtn').classList.replace('bg-red-500', 'bg-slate-200');
            document.getElementById('timerStopBtn').classList.replace('text-white', 'text-slate-400');
        };

        // Settings
        document.getElementById('openSettingsBtn').onclick = () => {
            document.getElementById('apiKeyInput').value = userApiKey;
            document.getElementById('settingsModal').classList.remove('hidden');
        };

        document.getElementById('saveSettingsBtn').onclick = () => {
            const val = document.getElementById('apiKeyInput').value.trim();
            userApiKey = val;
            localStorage.setItem('crb_gemini_key', val);
            document.getElementById('settingsModal').classList.add('hidden');
            showToast("Settings Saved");
            if (pendingAction) {
                const action = pendingAction;
                pendingAction = null;
                action();
            }
        };

        document.getElementById('clearTextBtn').onclick = () => {
            document.getElementById('textInput').value = "";
        };

        document.getElementById('clearLogBtn').onclick = () => {
            document.getElementById('logContent').innerHTML = "";
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = "1";
            setTimeout(() => t.style.opacity = "0", 3000);
        }

        window.onload = () => {
            addLog("Reading Buddy Pro v62.0 起動完了。");
            if (!userApiKey) {
                addLog("[SYSTEM] 初回起動: APIキーを設定してください。", 'warn');
                document.getElementById('settingsModal').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
